<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>個人頁</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 60px;
    }

    /* 左邊圖片 */
    .profile-img img {
      width: 200px;
      height: 200px;
      border-radius: 50%; /* 變圓形 */
      object-fit: cover;
    }

    /* 右邊文字 */
    .info {
      max-width: 500px;
    }

    .info h1 {
      font-size: 50px;
      margin: 0;
    }

    .info h2 {
      font-size: 22px;
      margin: 15px 0;
      font-weight: normal;
    }

    .info p {
      font-size: 18px;
      line-height: 1.5;
    }

    /* 按鈕 */
    .buttons {
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      margin-right: 10px;
      background-color: orange;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
    }

    .btn:hover {
      background-color: darkorange;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- 左邊圖片 -->
  <div class="profile-img">
    <img src="大頭.jpg">
  </div>

  <!-- 右邊文字 -->
  <div class="info">
    <h1>藍宇婕</h1>
    <h2>Dazhi High School 30410</h2>

    <p>
      未來想要就讀工程科系，所以努力在接觸程式設計的新手小白。
    </p>

    <div class="buttons">
     <a href="self.html"class="btn"> More about me in high school →</a>
      <a href="index.html" class="btn">Back →</a>
    </div>
  </div>

</div>

</body>
</html>
