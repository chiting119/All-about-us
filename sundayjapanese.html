<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Japanese</title>

<style>

/* 整體統一設定 */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 40px;
  background-color: #f3f3f3;
  color: #333;
  text-align: center;
}

/* 主標題 */
h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

/* 內文 */
p {
  font-size: 18px;
  line-height: 1.8;
}

/* 圖片 */
img {
  width: 260px;
  border-radius: 20px;
  margin-top: 20px;
}

/* 白色內容框 */
.section {
  background-color: white;
  padding: 30px;
  margin: 30px auto;
  width: 70%;
  border-radius: 15px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

/* 檔案按鈕（如果要放作品） */
.file-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 28px;
  background-color: orange;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
  font-size: 18px;
}

.file-btn:hover {
  background-color: darkorange;
}

/* Back 按鈕（在白色區塊內） */
.back-btn {
  display: inline-block;
  margin-top: 20px;
  font-size: 16px;
  color: #555;
  text-decoration: none;
}

.back-btn:hover {
  color: orange;
}

</style>

</head>

<body>

<h1>Japanese</h1>

<div class="section">

  <img src="japan.png">

  <p>
  在高一多元選修期間，我選擇修習第二外語（日文）。
  雖然在學習過程中曾遇到一些困難，但透過持續練習與努力，
  最終成功培養出一項新的語言能力，也讓自己對不同文化有更深入的了解。
  </p>

  <!-- 如果之後要放檔案（例如學習單 / 證書）可以用這個 -->
  <a href="日文報告第二學期期末.pdf.pdf"class="file-btn" target="_blank">
  View My Work
  </a>

  <br>

  <!-- Back 放在白色框裡 -->
  <a href="sundayhigh.html" class="back-btn">
  ← Back
  </a>

</div>

</body>
</html>
