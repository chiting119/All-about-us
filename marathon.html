<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marathon</title>

<style>

/* 統一整體格式 */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 40px;
  background-color: #f3f3f3;
  color: #333;
  text-align: center;
}

/* 主標題 */
h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

/* 內文 */
p {
  font-size: 18px;
  line-height: 1.8;
}

/* 白色區塊 */
.section {
  background-color: white;
  padding: 30px;
  margin: 30px auto;
  width: 70%;
  border-radius: 15px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

/* 三個按鈕排版 */
.button-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 20px;
}

/* 照片按鈕 */
.photo-btn {
  display: inline-block;
  padding: 14px 25px;
  background-color: orange;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
  font-size: 18px;
}

.photo-btn:hover {
  background-color: darkorange;
}

/* Back */
.back-btn {
  display: inline-block;
  margin-top: 25px;
  font-size: 16px;
  color: #555;
  text-decoration: none;
}

.back-btn:hover {
  color: orange;
}

</style>

</head>

<body>

<h1>Marathon</h1>

<div class="section">

<p>
在高中期間，我曾參加多場路跑活動，包括星光馬拉松、
長榮馬拉松以及華航馬拉松。透過這些比賽，我培養了
持續努力與堅持到底的精神，也提升了自我管理與體能
訓練的能力。
</p>
